name: crewai-office-visualizer

services:
  backend:
    build: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:////app/office_visualizer.db}
    ports:
      - "18765:8000"
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      args:
        VITE_WS_URL: ws://localhost:18765
    ports:
      - "17300:80"
    depends_on:
      - backend
    restart: unless-stopped

  mcp:
    build: ./mcp
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=18900
      - MCP_PATH=/mcp
      - OFFICE_VISUALIZER_API_URL=http://backend:8000
      - OFFICE_UI_BASE_URL=http://localhost:17300
      - OFFICE_VISUALIZER_HTTP_TIMEOUT=10
    ports:
      - "18900:18900"
    depends_on:
      - backend
    restart: unless-stopped
